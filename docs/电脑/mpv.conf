# =========================================================================
# 一、 基础与窗口行为（现代化极简体验）
# =========================================================================
vo=gpu-next                     # 目前画面还原度、色彩表现最好的下一代渲染后端
hwdec=auto-safe                 # 自动显卡硬件解码，高码率 4K/2K 电影不卡顿
border=no                       # 彻底关闭系统原生边框，交由 uosc 实现无边框悬浮
keep-open=yes                   # 播放完毕后暂停在最后一帧，不自动关闭
save-position-on-quit=yes       # 退出时自动记住上次的播放进度
autofit=90%x90%                 # 首次打开时窗口大小适中

# =========================================================================
# 二、 2K 屏幕高 DPI 字幕与 OSD 优化（防止字太小）
# =========================================================================
sub-scale-with-window=yes       # 字幕随窗口大小自动等比例缩放
osd-scale-with-window=yes       # UI 提示随窗口大小缩放
sub-font-size=44                 # 完美适配 2K 屏幕的字幕字号
osd-font-size=32                 # 完美适配 2K 屏幕的提示字号
sub-auto=fuzzy                  # 自动模糊加载同目录下所有名字相近的外部字幕
screenshot-format=png           # 截图使用无损 PNG 格式
screenshot-directory="~/Pictures/mpv" # 截图自动保存到系统的图片目录

volume-max=120                  # 允许音量最大放大到 150%