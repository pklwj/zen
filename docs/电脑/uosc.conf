# =========================================================================
# uosc 2K高清屏 & 网友高赞全能调优配置
# =========================================================================

# --- 一、 2K 高清屏缩放与视觉增强 ---
# 核心：整体 UI 缩放比例（默认 1 改为 1.4，适配 2K 屏防止图标和字太小）
scale=1.4
# 全屏下的缩放比例同步保持舒适大小
scale_fullscreen=1.3
# 稍微加深文字和按钮阴影，防止纯白或过亮的游戏画面遮挡 UI 元素
text_border=1.4
# 按钮、菜单及所有矩形框的圆角弧度，4 像素极具现代感
border_radius=4

# --- 二、 进度条/时间轴（Timeline）2K 适配调优 ---
# 进度条样式：使用 line 极简线条模式（可选：bar）
timeline_style=line
# 闲置时基础线条宽度
timeline_line_width=3
# 鼠标靠近完全展开时的时间轴高度（增大到 45 像素，在 2K 下极易点击和拖拽）
timeline_size=45
# 时间轴顶部边框线，帮助视觉上将进度条与视频画面完美隔开
timeline_border=1
# 鼠标在进度条上滚动滚轮时快进/快退的秒数
timeline_step=5
# 开启流媒体缓存显示（如播放网络视频、B站/YouTube 视频时显示缓冲条）
timeline_cache=yes
# 播放 YouTube 视频时在进度条上方渲染高能看点热力图
timeline_heatmap=overlay

# 始终显示的迷你状态进度条（当鼠标移开、UI完全隐藏时，底部保留的极细微进度条）
progress=windowed
progress_size=3
progress_line_width=20

# --- 三、 悬浮控制栏（Controls）按钮精简排布 ---
# 结合网友习惯定制：加入最常用的字幕、音轨、速度、全屏等高频键，去除多余繁琐按钮
controls=menu,gap,<video,audio>subtitles,<has_many_audio>audio,<has_many_video>video,<has_many_edition>editions,<stream>stream-quality,gap,space,<video,audio>speed,space,shuffle,loop-playlist,loop-file,gap,prev,items,next,gap,command:info:script-binding stats/display-stats-toggle?查看视频信息,fullscreen
# 按钮图标大小，32 像素非常适中
controls_size=32
# 底部控制栏留白间距
controls_margin=12
controls_spacing=4
controls_persistency=

# --- 四、 音量与速度控制（支持音量超载） ---
# 音量条显示在右侧
volume=right
volume_size=40
volume_border=1
# 鼠标滚轮调节音量的步长（每次加减 2%）
volume_step=2
volume_persistency=

# 播放速度微调步长（每次点击或滚动改变 0.1 倍速）
speed_step=0.1
speed_step_is_factor=no
speed_persistency=

# --- 五、 现代悬浮菜单调优 ---
# 菜单每行高度，方便高分辨率鼠标精准悬停点击
menu_item_height=40
menu_min_width=280
menu_padding=6
# 网友力推：打开菜单后直接敲击键盘字母即可搜索（如直接搜字幕名），极为方便
menu_type_to_search=yes

# --- 六、 顶部标题栏（实现现代化无边框视窗） ---
# 开启无边框模式下的顶部标题栏（鼠标靠近顶部时才下滑浮现）
top_bar=no-border
top_bar_size=45
# 右上角显示关闭/最小化/全屏等标准窗口控件
top_bar_controls=right
# 继承自 mpv.conf 的媒体标题（显示当前播放的视频名称）
top_bar_title=yes
top_bar_alt_title=${filename}
top_bar_alt_title_place=below
# 当加载视频或音频文件时，顶部标题栏轻轻闪烁一下以示提醒
top_bar_flash_on=video,audio
top_bar_persistency=

window_border_size=1

# --- 七、 网友省心自动化与回放交互调优 ---
# 关闭 uosc 抢占式的自动连播（建议由 mpv.conf 控全局，防冲突）
autoload=no
shuffle=no
font_bold=no

# 进度条右侧时间显示模式：playtime-remaining（根据当前播放速度计算的真正剩余时间）
destination_time=playtime-remaining
# 时间戳秒数后面不显示微小的毫秒分数，保持清爽
time_precision=0
buffered_time_threshold=60

# 核心交互：点击视频画面任意空白处 = 暂停/播放（网游复盘、追剧最习惯的操作）
pause_on_click_shutter=yes
# 默认静止 1 秒（1000毫秒）后自动隐藏所有 UI 元素，完全不遮挡游戏画面
autohide_timeout=1000
autohide=no
pause_indicator=flash

# 视频导航默认打开的初始目录
default_directory=~/
show_hidden_files=no
# 网友推荐：使用 uosc 菜单删除文件时自动移入系统回收站（Linux 需安装 trash-cli）
use_trash=yes
adjust_osd_margins=yes



# 语言优先级
languages=slang,zh,en
# 字幕自动下载存放的默认文件夹路径（默认存放于 ~/.config/mpv/subtitles/）
subtitles_directory=~~/subtitles

# 允许遵守的内置媒体格式后缀
video_types=3g2,3gp,asf,avi,f4v,flv,h264,h265,m2ts,m4v,mkv,mov,mp4,mp4v,mpeg,mpg,ogm,ogv,rm,rmvb,ts,vob,webm,wmv,y4m
audio_types=aac,ac3,aiff,ape,au,cue,dsf,dts,flac,m4a,mid,midi,mka,mp3,mp4a,oga,ogg,opus,spx,tak,tta,wav,weba,wma,wv
image_types=apng,avif,bmp,gif,j2k,jp2,jfif,jpeg,jpg,jxl,mj2,png,svg,tga,tif,tiff,webp
subtitle_types=aqt,ass,gsub,idx,jss,lrc,mks,pgs,pjs,psb,rt,sbv,slt,smi,sub,sup,srt,ssa,ssf,ttxt,txt,usf,vt,vtt
playlist_types=m3u,m3u8,pls,url,cue
load_types=video,audio,image